<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETx Game Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f0f5fc;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0;
  }

  .hero {
    max-width: 100%;
    width: 100%;
    background: #eef3fb;
    border-radius: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 0;
    overflow: hidden;
    position: relative;
    min-height: 420px;
  }



  /* ── LEFT COLUMN ── */
  .left {
    padding: 32px 52px 16px 140px;
    z-index: 1;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: #f6e3f3;
    border: 1px solid #ebcce8;
    border-radius: 100px;
    padding: 5px 14px;
    margin-bottom: 22px;
  }

  .badge-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #7a3a78;
    flex-shrink: 0;
  }

  .badge-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #7a3a78;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Sora', sans-serif;
    line-height: 1.08;
    margin-bottom: 16px;
  }

  h1 .black { display: block; font-size: 52px; font-weight: 800; color: #0d1b2a; }

  h1 .pink {
    display: block;
    font-size: 52px;
    font-weight: 800;
    background: linear-gradient(90deg, #c040a0, #a04297);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  h1 .blue {
    display: block;
    font-size: 52px;
    font-weight: 800;
    background: linear-gradient(90deg, #0a4a8f, #1c7bd1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #0a4a8f;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .subtitle .sep { opacity: 0.35; font-weight: 400; }

  .body-text {
    font-size: 14px;
    line-height: 1.8;
    color: #475066;
    margin-bottom: 28px;
    max-width: 420px;
  }

  .body-text b { color: #2c3a54; font-weight: 700; }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #0a4a8f;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 26px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: background 0.2s, transform 0.15s;
  }

  .cta:hover { background: #0d5cb8; transform: translateY(-1px); }
  .cta:active { transform: translateY(0); }

  .cta-arrow {
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* ── RIGHT COLUMN ── */
  .right {
    position: relative;
    padding: 48px 48px 48px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 420px;
  }




</style>
</head>
<body>

<section class="hero">

  <!-- LEFT -->
  <div class="left">

    <div class="badge">
      <span class="badge-dot"></span>
      <span class="badge-text">ETx Game Zone</span>
    </div>

    <h1>
      <span class="black">Think Fast,</span>
      <span class="pink">Play Smart,</span>
      <span class="blue">Go Tech.</span>
    </h1>

    <p class="subtitle">
      Powered by ETAD
    </p>

    <p class="body-text">
      Put your tech knowledge to the test! From <b>debugging code</b> to <b>designing smart cities</b> — these six interactive games, crafted by Amirullah, make learning <b>emerging technologies</b> genuinely fun. Join us and enjoy the experience!
    </p>

    <a class="cta" href="#">
      Play Now
      <span class="cta-arrow">
        <svg viewBox="0 0 18 18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <line x1="3" y1="9" x2="15" y2="9"/>
          <polyline points="10,4 15,9 10,14"/>
        </svg>
      </span>
    </a>

  </div>

  <!-- RIGHT -->
  <div class="right">



  </div>

</section>

</body>
</html>
